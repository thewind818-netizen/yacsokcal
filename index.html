<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>약속달력 📅</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 로그인 화면 -->
  <div id="login-screen" class="screen">
    <div class="login-box">
      <div class="logo">📅</div>
      <h1>약속달력</h1>
      <p class="subtitle">친구들과 일정을 공유하세요</p>
      <input id="login-name" type="text" placeholder="닉네임을 입력하세요" maxlength="10" />
      <button onclick="login()">시작하기</button>
      <p class="hint">닉네임만 입력하면 바로 사용 가능해요.<br>같은 닉네임으로 재접속하면 내 일정이 유지됩니다.</p>
      <div id="login-banner"></div>
    </div>
  </div>

  <!-- 메인 앱 화면 -->
  <div id="app-screen" class="screen hidden">
    <header>
      <div class="header-left">
        <span class="logo-small">📅 약속달력</span>
      </div>
      <div class="header-right">
        <span id="header-username"></span>
        <button class="btn-icon" onclick="copyShareLink()">🔗 공유링크</button>
        <button class="btn-icon" onclick="logout()">로그아웃</button>
      </div>
    </header>

    <div class="layout">

      <!-- 왼쪽: 친구 목록 -->
      <aside>
        <div class="aside-section">
          <h3>내 달력</h3>
          <div class="user-badge" id="my-badge"></div>
        </div>
        <div class="aside-section">
          <h3>친구 목록</h3>
          <div id="friend-list"><p class="empty-msg">친구를 추가해보세요</p></div>
          <div class="add-friend-row">
            <input id="friend-input" type="text" placeholder="친구 닉네임" />
            <button onclick="sendFriendRequest()">추가</button>
          </div>
        </div>
        <div class="aside-section">
          <h3>받은 친구 요청</h3>
          <div id="request-list"><p class="empty-msg">없음</p></div>
        </div>
      </aside>

      <!-- 달력 -->
      <main>
        <div class="cal-header">
          <button onclick="changeMonth(-1)">‹</button>
          <h2 id="cal-title"></h2>
          <button onclick="changeMonth(1)">›</button>
          <button class="btn-primary" onclick="openModal()">+ 약속 추가</button>
        </div>
        <div class="weekdays">
          <span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="sat">토</span>
        </div>
        <div class="days" id="days-grid"></div>
      </main>

      <!-- 오른쪽: 선택된 날 상세 -->
      <aside class="right-aside">
        <div class="aside-section">
          <h3 id="selected-date-title">일정 상세</h3>
          <div id="event-detail-list"><p class="empty-msg">날짜를 클릭하면<br>약속이 표시됩니다</p></div>
        </div>
      </aside>
    </div>
  </div>

  <!-- 약속 추가 모달 -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModalOutside(event)">
    <div class="modal">
      <h3>약속 추가</h3>
      <label>약속 이름</label>
      <input id="m-title" type="text" placeholder="예: 점심 약속" />

      <label>날짜</label>
      <input id="m-date" type="date" />

      <label>시간</label>
      <input id="m-time" type="time" value="12:00" />

      <label>장소 (선택)</label>
      <input id="m-place" type="text" placeholder="예: 강남역 근처" />

      <label>메모 (선택)</label>
      <input id="m-memo" type="text" placeholder="짧은 메모" />

      <label>공개 설정</label>
      <select id="m-privacy">
        <option value="public">🌐 전체공개 — 모두에게 "약속 있음"만 표시</option>
        <option value="friends">👥 친구만 — 친구에게 내용 포함 표시</option>
        <option value="selected">👤 특정 친구만 — 선택한 친구에게만 표시</option>
        <option value="private">🔒 나만보기</option>
      </select>

      <div id="friend-select-box" class="hidden">
        <label>공개할 친구 선택</label>
        <div id="friend-checkboxes"></div>
      </div>

      <div class="modal-actions">
        <button onclick="closeModal()">취소</button>
        <button class="btn-primary" onclick="saveEvent()">저장</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
